<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>True Size of Yakutia</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .panel {
      <div class="rotate-control">
        <button onclick="rotateYakutia(-10)">⟲</button>
        <button onclick="rotateYakutia(10)">⟳</button>
      </div>
      .rotate-control {
        margin-top: 10px;
      }
      .rotate-control button {
        margin-right: 6px;
      }
      position: absolute;
      z-index: 1000;
      bottom: 16px;
      right: 16px;
      width: 320px;
      background: rgba(255, 255, 255, 0.85);
      padding: 16px;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);      
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0 0 12px;
      font-size: 14px;
      color: #555;
      line-height: 1.45;
    }

    .stat {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .hint {
      font-size: 13px;
      color: #777;
      line-height: 1.4;
    }

    button {
      border: 0;
      background: #111;
      color: white;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover {
      background: #444;
    }

    .leaflet-interactive {
      cursor: grab;
    }

    .leaflet-interactive:active {
      cursor: grabbing;
    }
  </style>
</head>

<body>
  <div class="panel">
    <h1>True Size of Yakutia</h1>

    <p>
      Drag the outline of Yakutia around the world and compare its actual size with other territories
    </p>

    <div class="stat">
      Area of ​​Yakutia: ≈ 3.08 million km²
    </div>

    <div class="hint">
      Grab the red outline with your mouse or finger and move it around the map
    </div>

    <button onclick="resetYakutia()">Reset Yakutia</button>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <script>
    const map = L.map('map', {
      center: [64, 125],
      zoom: 3,
      worldCopyJump: true
    });

    L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', {
      maxZoom: 10,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let originalGeoJson = null;
    let currentGeoJson = null;
    let yakutiaLayer = null;

    let originalCenter = null;
    let currentCenter = null;

    let isDragging = false;

    fetch('yakutia.geojson')
      .then(response => response.json())
      .then(data => {
        originalGeoJson = data;

        originalCenter = turf.center(data).geometry.coordinates;
        currentCenter = originalCenter;

        currentGeoJson = JSON.parse(JSON.stringify(originalGeoJson));

        drawYakutia(currentGeoJson);

        map.fitBounds(yakutiaLayer.getBounds(), {
          padding: [40, 40]
        });
      });

    function drawYakutia(geojson) {
      if (yakutiaLayer) {
        map.removeLayer(yakutiaLayer);
      }

      yakutiaLayer = L.geoJSON(geojson, {
        style: {
          color: '#e60023',
          weight: 2.5,
          fillColor: '#e60023',
          fillOpacity: 0.28
        }
      }).addTo(map);

      yakutiaLayer.eachLayer(layer => {
        layer.on('mousedown', startDragging);
        layer.on('touchstart', startDragging);
      });
    }

    function startDragging(event) {
      isDragging = true;
      map.dragging.disable();

      if (event.originalEvent) {
        event.originalEvent.preventDefault();
      }
    }

    map.on('mousemove', event => {
      if (!isDragging) return;

      moveYakutiaTo(event.latlng.lat, event.latlng.lng);
    });

    map.on('mouseup', () => {
      stopDragging();
    });

    map.on('touchmove', event => {
      if (!isDragging) return;

      const touch = event.originalEvent.touches[0];
      const latlng = map.mouseEventToLatLng(touch);

      moveYakutiaTo(latlng.lat, latlng.lng);
    });

    map.on('touchend', () => {
      stopDragging();
    });

    function stopDragging() {
      if (!isDragging) return;

      isDragging = false;
      map.dragging.enable();
    }

    function moveYakutiaTo(lat, lng) {
      currentCenter = [lng, lat];

      currentGeoJson = moveGeoJsonToCenter(
        originalGeoJson,
        originalCenter,
        currentCenter
      );

      drawYakutia(currentGeoJson);
    }

    function resetYakutia() {
      currentCenter = originalCenter;
      currentGeoJson = JSON.parse(JSON.stringify(originalGeoJson));

      drawYakutia(currentGeoJson);

      map.fitBounds(yakutiaLayer.getBounds(), {
        padding: [40, 40]
      });
    }

    function moveGeoJsonToCenter(geojson, fromCenter, toCenter) {
      const cloned = JSON.parse(JSON.stringify(geojson));

      function moveCoord(coord) {
        const distance = turf.distance(
          turf.point(fromCenter),
          turf.point(coord),
          { units: 'kilometers' }
        );

        const bearing = turf.bearing(
          turf.point(fromCenter),
          turf.point(coord)
        );

        const moved = turf.destination(
          turf.point(toCenter),
          distance,
          bearing,
          { units: 'kilometers' }
        );

        return moved.geometry.coordinates;
      }

      function processCoordinates(coords) {
        if (typeof coords[0] === 'number') {
          return moveCoord(coords);
        }

        return coords.map(processCoordinates);
      }

      cloned.features = cloned.features.map(feature => {
        feature.geometry.coordinates = processCoordinates(
          feature.geometry.coordinates
        );

        return feature;
      });

      return cloned;
    }
  </script>
</body>
</html>
