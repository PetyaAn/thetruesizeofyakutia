<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>True Size of Yakutia</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin:0; height:100%; font-family:Arial,sans-serif; overflow:hidden; background:#a9c8d3; }
    #map { width:100%; height:100dvh; background:#a9c8d3; }
    .panel { position:absolute; z-index:1000; right:18px; bottom:18px; width:330px; background:rgba(255,255,255,.9); backdrop-filter:blur(10px); padding:16px; border-radius:18px; box-shadow:0 12px 35px rgba(0,0,0,.25); pointer-events:auto; }
    h1 { margin:0 0 8px; font-size:22px; line-height:1.15; }
    p { margin:0 0 12px; font-size:14px; color:#555; line-height:1.45; }
    .stat { font-size:14px; font-weight:700; margin-bottom:12px; }
    .hint { font-size:13px; color:#666; line-height:1.4; margin-bottom:12px; }
    .panel-actions { display:flex; flex-wrap:wrap; gap:8px; }
    button { border:0; background:#111; color:white; padding:9px 12px; border-radius:10px; cursor:pointer; font-weight:700; }
    button:hover { background:#333; }
    .leaflet-interactive { cursor:grab; touch-action:none; }
    .leaflet-interactive:active { cursor:grabbing; }
    .compass { position: absolute; z-index: 1000; right: 20px; bottom: 140px; /* поднимаем над панелью */ width: 116px; height: 116px; border-radius: 50%; background: rgba(255, 255, 255, 0.78); backdrop-filter: blur(8px); box-shadow: 0 10px 28px rgba(0,0,0,0.26);  display: flex; align-items: center; justify-content: center; user-select: none; touch-action: none; }
    .compass:active { cursor:grabbing; }
    .compass-ring { width:96px; height:96px; border-radius:50%; border:2px solid rgba(20,40,60,.25); position:relative; background:radial-gradient(circle, rgba(255,255,255,.96) 0%, rgba(231,244,249,.82) 60%, rgba(185,216,226,.72) 100%); }
    .compass-needle { position:absolute; left:50%; top:50%; width:8px; height:78px; transform-origin:50% 50%; transform:translate(-50%,-50%) rotate(0deg); pointer-events:none; }
    .compass-needle::before { content:""; position:absolute; left:50%; top:0; transform:translateX(-50%); width:0; height:0; border-left:11px solid transparent; border-right:11px solid transparent; border-bottom:44px solid #f1d64a; filter:drop-shadow(0 1px 1px rgba(0,0,0,.35)); }
    .compass-needle::after { content:""; position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent; border-top:34px solid #5d7682; opacity:.75; }
    .compass-center { position:absolute; width:14px; height:14px; border-radius:50%; background:#111; left:50%; top:50%; transform:translate(-50%,-50%); box-shadow:0 0 0 4px rgba(255,255,255,.75); pointer-events:none; }
    .compass-label { position:absolute; top:5px; left:50%; transform:translateX(-50%); font-size:12px; font-weight:700; color:#111; pointer-events:none; }
    @media (max-width:768px) {
      .panel { left:12px; right:0px; bottom:0px; width:auto; padding:12px; border-radius: 18px 0 0 0; }
      h1 { font-size:18px; }
      p { font-size:13px; margin-bottom:8px; }
      .stat { font-size:13px; margin-bottom:8px; }
      .hint { font-size:12px; margin-bottom:10px; }
      button { padding:8px 10px; }
      .compass { width:92px; height:92px; left:14px; bottom:178px; }
      .compass-ring { width:76px; height:76px; }
      .compass-needle { height:62px; }
      .compass-needle::before { border-left-width:9px; border-right-width:9px; border-bottom-width:35px; }
      .compass-needle::after { border-left-width:8px; border-right-width:8px; border-top-width:27px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <h1>True Size of Yakutia</h1>
    <p>Drag the outline of Yakutia around the world and compare its actual size with other territories.</p>
    <div class="stat">Area of ​​Yakutia: ≈ 3.08 mln km²</div>
    <div class="hint">On your phone: Press and hold the red outline with one finger and drag. The compass rotates Yakutia.</div>
    <div class="panel-actions">
      <button type="button" onclick="resetYakutia()">Reset Yakutia</button>
      <button type="button" onclick="rotateYakutiaBy(-15)">⟲ 15°</button>
      <button type="button" onclick="rotateYakutiaBy(15)">⟳ 15°</button>
    </div>
  </div>
  <div class="compass" id="compass" title="Вращать Якутию">
    <div class="compass-ring"><div class="compass-label">N</div><div class="compass-needle" id="compassNeedle"></div><div class="compass-center"></div></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script>
    const map = L.map('map', { center:[64,125], zoom:3, worldCopyJump:true, tap:false, zoomControl:true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 10,attribution: '© OpenStreetMap' }).addTo(map);
    let originalGeoJson=null, currentGeoJson=null, yakutiaLayer=null;
    let originalCenter=null, currentCenter=null;
    let currentRotation=0, activeMode=null, activePointerId=null;
    const compass=document.getElementById('compass');
    const compassNeedle=document.getElementById('compassNeedle');

    fetch('yakutia.geojson')
      .then(response => { if(!response.ok) throw new Error('Не найден файл yakutia.geojson'); return response.json(); })
      .then(data => { originalGeoJson=data; originalCenter=turf.center(data).geometry.coordinates; currentCenter=originalCenter; redrawYakutia(); map.fitBounds(yakutiaLayer.getBounds(), {padding:[40,40]}); })
      .catch(error => { console.error(error); alert('Не удалось загрузить yakutia.geojson. Проверь название файла и валидность JSON.'); });

    function redrawYakutia(){
      if(!originalGeoJson || !currentCenter) return;
      const moved=moveGeoJsonToCenter(originalGeoJson, originalCenter, currentCenter);
      currentGeoJson=rotateGeoJson(moved, currentCenter, currentRotation);
      drawYakutia(currentGeoJson);
      updateCompass();
    }

    function drawYakutia(geojson){
      if(yakutiaLayer) map.removeLayer(yakutiaLayer);
      yakutiaLayer=L.geoJSON(geojson, { style:{ color:'#e60023', weight:2.5, fillColor:'#e60023', fillOpacity:.28 } }).addTo(map);
      yakutiaLayer.eachLayer(layer => {
        layer.on('mousedown', startMoveFromLeaflet);
        layer.on('touchstart', startMoveFromLeaflet);
        setTimeout(() => {
          if(layer._path){
            layer._path.style.touchAction='none';
            layer._path.addEventListener('pointerdown', startMoveFromPointer, {passive:false});
            layer._path.addEventListener('touchstart', startMoveFromTouch, {passive:false});
          }
        }, 0);
      });
    }

    function lockMap(){ map.dragging.disable(); map.touchZoom.disable(); map.doubleClickZoom.disable(); if(map.scrollWheelZoom) map.scrollWheelZoom.disable(); }
    function unlockMap(){ map.dragging.enable(); map.touchZoom.enable(); map.doubleClickZoom.enable(); if(map.scrollWheelZoom) map.scrollWheelZoom.enable(); }

    function startMoveFromLeaflet(event){
      const original=event.originalEvent; if(!original) return;
      activeMode='move'; activePointerId=original.pointerId || null; lockMap();
      original.preventDefault(); original.stopPropagation();
    }

    function startMoveFromPointer(event){
      activeMode='move'; activePointerId=event.pointerId; lockMap();
      if(event.target.setPointerCapture) event.target.setPointerCapture(event.pointerId);
      event.preventDefault(); event.stopPropagation();
    }

    function startMoveFromTouch(event){
      activeMode='move'; activePointerId=null; lockMap();
      event.preventDefault(); event.stopPropagation();
    }

    function moveYakutiaByClientPoint(clientX, clientY){
      const rect=map.getContainer().getBoundingClientRect();
      const point=L.point(clientX - rect.left, clientY - rect.top);
      const latlng=map.containerPointToLatLng(point);
      currentCenter=[latlng.lng, latlng.lat];
      redrawYakutia();
    }

    window.addEventListener('pointermove', event => {
      if(activeMode==='move'){
        if(activePointerId!==null && event.pointerId!==activePointerId) return;
        moveYakutiaByClientPoint(event.clientX, event.clientY);
        event.preventDefault();
      }
      if(activeMode==='rotate'){
        if(activePointerId!==null && event.pointerId!==activePointerId) return;
        setYakutiaRotation(getCompassAngle(event.clientX, event.clientY));
        event.preventDefault();
      }
    }, {passive:false});

    window.addEventListener('pointerup', stopInteraction);
    window.addEventListener('pointercancel', stopInteraction);
    window.addEventListener('mouseup', stopInteraction);

    window.addEventListener('touchmove', event => {
      if(activeMode!=='move' && activeMode!=='rotate') return;
      const touch=event.touches[0]; if(!touch) return;
      if(activeMode==='move') moveYakutiaByClientPoint(touch.clientX, touch.clientY);
      if(activeMode==='rotate') setYakutiaRotation(getCompassAngle(touch.clientX, touch.clientY));
      event.preventDefault();
    }, {passive:false});

    window.addEventListener('touchend', stopInteraction);
    window.addEventListener('touchcancel', stopInteraction);

    function stopInteraction(){
      if(!activeMode) return;
      activeMode=null; activePointerId=null; unlockMap();
    }

    function resetYakutia(){
      currentCenter=originalCenter; currentRotation=0; redrawYakutia();
      if(yakutiaLayer) map.fitBounds(yakutiaLayer.getBounds(), {padding:[40,40]});
    }
    function rotateYakutiaBy(angle){ currentRotation += angle; redrawYakutia(); }
    function setYakutiaRotation(angle){ currentRotation=angle; redrawYakutia(); }
    function updateCompass(){ compassNeedle.style.transform=`translate(-50%, -50%) rotate(${currentRotation}deg)`; }

    function getCompassAngle(clientX, clientY){
      const rect=compass.getBoundingClientRect();
      const cx=rect.left + rect.width/2, cy=rect.top + rect.height/2;
      return Math.atan2(clientX-cx, -(clientY-cy)) * 180 / Math.PI;
    }

    compass.addEventListener('pointerdown', event => {
      activeMode='rotate'; activePointerId=event.pointerId; lockMap();
      if(compass.setPointerCapture) compass.setPointerCapture(event.pointerId);
      setYakutiaRotation(getCompassAngle(event.clientX, event.clientY));
      event.preventDefault(); event.stopPropagation();
    }, {passive:false});

    compass.addEventListener('touchstart', event => {
      const touch=event.touches[0]; if(!touch) return;
      activeMode='rotate'; activePointerId=null; lockMap();
      setYakutiaRotation(getCompassAngle(touch.clientX, touch.clientY));
      event.preventDefault(); event.stopPropagation();
    }, {passive:false});

    function moveGeoJsonToCenter(geojson, fromCenter, toCenter){
      const cloned=JSON.parse(JSON.stringify(geojson));
      function moveCoord(coord){
        const distance=turf.distance(turf.point(fromCenter), turf.point(coord), {units:'kilometers'});
        const bearing=turf.bearing(turf.point(fromCenter), turf.point(coord));
        return turf.destination(turf.point(toCenter), distance, bearing, {units:'kilometers'}).geometry.coordinates;
      }
      function processCoordinates(coords){ return typeof coords[0]==='number' ? moveCoord(coords) : coords.map(processCoordinates); }
      cloned.features=cloned.features.map(feature => { feature.geometry.coordinates=processCoordinates(feature.geometry.coordinates); return feature; });
      return cloned;
    }

    function rotateGeoJson(geojson, center, angle){
      const cloned=JSON.parse(JSON.stringify(geojson));
      function rotateCoord(coord){
        const distance=turf.distance(turf.point(center), turf.point(coord), {units:'kilometers'});
        const bearing=turf.bearing(turf.point(center), turf.point(coord));
        return turf.destination(turf.point(center), distance, bearing+angle, {units:'kilometers'}).geometry.coordinates;
      }
      function processCoordinates(coords){ return typeof coords[0]==='number' ? rotateCoord(coords) : coords.map(processCoordinates); }
      cloned.features=cloned.features.map(feature => { feature.geometry.coordinates=processCoordinates(feature.geometry.coordinates); return feature; });
      return cloned;
    }
  </script>
</body>
</html>
